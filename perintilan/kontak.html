      .contact-section {
        display: flex;
        flex-direction: column;

        gap: 15px;

      }

      .contact-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .contact-item img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }

      .contact-item a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
      }

      .contact-item a:hover {
        color: #ff4081;
      }
    </style>
  </head>

  <body>

        <div class="contact-section">

            <img src="kontak3.jpg" alt="Email Icon" />
            <a href="mailto:fashion.instant@gmail.com"
              >fashion.instant@gmail.com</a
